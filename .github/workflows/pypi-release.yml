name: PyPI Release

# Trigger conditions: push tag, create release on GitHub, or manual trigger
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'  # Support pre-release versions like 1.0.0-beta1
  release:
    types: [created]  # Trigger when release is created on github.com
  workflow_dispatch:  # Allow manual trigger
    inputs:
      test_mode:
        description: 'Test mode (do not publish to PyPI, do not create Release)'
        required: false
        default: 'true'  # Default to test mode
        type: choice
        options:
          - 'true'
          - 'false'
      target_branch:
        description: 'Display current running branch (for reference only, select branch on Actions page)'
        required: false
        default: 'Select branch on Actions page'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine setuptools wheel

    # Install package dependencies for testing
    - name: Install package dependencies
      run: |
        pip install -e .
      continue-on-error: true  # Some dependencies may not be available in CI environment

    # Run basic import test
    - name: Test package import
      run: |
        python -c "import mirobody; print(f'Mirobody imported successfully')"
      continue-on-error: true

    # Get version from tag or use test version
    - name: Set version from tag or manual trigger
      run: |
        if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
          # If triggered by release creation on github.com
          VERSION="${{ github.event.release.tag_name }}"
          echo "🎯 Running on release: $VERSION"
        elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
          # If it's a tag push, use tag name as version
          VERSION=${GITHUB_REF#refs/tags/}
          echo "🎯 Running on tag: $VERSION"
        else
          # If manually triggered, generate PEP 440 compliant test version
          # Format: 0.0.0.devYYYYMMDDHHMMSS (dev number must be pure digits)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          VERSION="0.0.0.dev${TIMESTAMP}"

          echo "🧪 Manual test trigger on branch: $BRANCH_NAME"
          echo "📦 Test version: $VERSION"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Setting version to $VERSION"
        sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" mirobody/__init__.py
        cat mirobody/__init__.py

    # Build Python package
    - name: Build package
      run: |
        python -m build
        ls -la dist/

    # Verify package contents
    - name: Check package
      run: |
        pip install twine
        twine check dist/*

    # Test package installation
    - name: Test package installation
      run: |
        pip install dist/*.whl
        python -c "import mirobody; print(f'Version: {mirobody.__version__}')"
        pip uninstall -y mirobody

    # Upload to TestPyPI
    - name: Publish to TestPyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: |
        echo "Uploading to TestPyPI..."
        twine upload --repository testpypi dist/* || echo "TestPyPI upload failed (may already exist)"
      continue-on-error: true

    # Upload to PyPI (only for official tags or release events, and not in test mode)
    - name: Publish to PyPI
      if: (startsWith(github.ref, 'refs/tags/') || github.event_name == 'release') && github.event.inputs.test_mode != 'true'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        echo "Uploading to PyPI..."
        twine upload --repository pypi dist/*
      continue-on-error: true

    # Create or update GitHub Release (upload build artifacts)
    - name: Upload to GitHub Release
      if: (startsWith(github.ref, 'refs/tags/') || github.event_name == 'release') && github.event.inputs.test_mode != 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(env.VERSION, 'a') || contains(env.VERSION, 'b') || contains(env.VERSION, 'rc') || contains(env.VERSION, 'dev') }}
        tag_name: ${{ env.VERSION }}
        name: "Release v${{ env.VERSION }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Optional: Print installation instructions
    - name: Print installation instructions
      run: |
        echo "🎉 Release $VERSION completed!"
        echo ""
        echo "📦 Install from TestPyPI:"
        echo "pip install -i https://test.pypi.org/simple/ mirobody==$VERSION"
        echo ""
        echo "📦 Install from PyPI:"
        echo "pip install mirobody==$VERSION"
        echo ""
        echo "📦 Or download from GitHub Release:"
        echo "https://github.com/${{ github.repository }}/releases/tag/$VERSION"